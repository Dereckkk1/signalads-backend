# redis.conf — Configuração de segurança para produção (E-Rádios / Signalads)
# Gerado como parte do security hardening (audit 2026-04-23, item H12)

# ─── Bind ────────────────────────────────────────────────────────────────────
# Aceita conexões APENAS do localhost.
# Em produção, se o Redis rodar em container separado, use o IP interno da rede
# privada (ex: 10.0.0.x) ao invés de 0.0.0.0.
bind 127.0.0.1

# Porta padrão — troque em ambientes altamente sensíveis
port 6379

# ─── Autenticação ────────────────────────────────────────────────────────────
# OBRIGATÓRIO em produção. Substitua pelo valor de REDIS_PASSWORD no seu .env.
# Gere um com: openssl rand -hex 32
# Depois configure o cliente Node com: redis.createClient({ password: process.env.REDIS_PASSWORD })
requirepass SUBSTITUA_POR_SENHA_FORTE_DO_ENV

# ─── TLS (recomendado para conexões cross-host) ───────────────────────────────
# Descomente e configure se Redis e Node.js não estiverem no mesmo host:
# tls-port 6380
# tls-cert-file /path/to/redis.crt
# tls-key-file /path/to/redis.key
# tls-ca-cert-file /path/to/ca.crt

# ─── Proteções adicionais ─────────────────────────────────────────────────────
# Desabilita comandos perigosos (flush, config, debug, monitor)
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command DEBUG ""
rename-command MONITOR ""
rename-command SLAVEOF ""
rename-command REPLICAOF ""

# Protege contra ataques de força-bruta (desabilita acesso via protocolo HTTP)
protected-mode yes

# ─── Limites de memória ───────────────────────────────────────────────────────
# Ajuste conforme RAM disponível. Política: expira chaves mais antigas quando cheio.
maxmemory 256mb
maxmemory-policy allkeys-lru

# ─── Logs ─────────────────────────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis-server.log

# ─── Persistência ─────────────────────────────────────────────────────────────
# Para cache-only (sem persistência), descomente:
# save ""
# appendonly no

# Para persistência mínima (RDB snapshots):
save 900 1
save 300 10
save 60 10000
